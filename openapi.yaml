openapi: 3.0.3
info:
  title: Fan Avia API
  version: 1.1.0

paths:
  /v1/clubs:
    get:
      summary: Get clubs dictionary
      description: Returns club dictionary with names, logo, city and airport IATA.
      responses:
        "200":
          description: Clubs response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetClubsResponse"
              example:
                clubs:
                  - club_id: "1"
                    name_ru: "Спартак Москва"
                    name_en: "Spartak Moscow"
                    logo: "1.svg"
                    city: "Москва"
                    airport_iata: "MOW"
                  - club_id: "3"
                    name_ru: "Зенит"
                    name_en: "Zenit"
                    logo: "3.svg"
                    city: "Санкт-Петербург"
                    airport_iata: "LED"
        "502":
          description: Upstream source error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: "match adapter error"

  /v1/matches:
    get:
      summary: Get matches by ids
      description: Returns a list of match objects by comma-separated ids.
      parameters:
        - in: query
          name: ids
          required: true
          schema:
            type: string
          description: Comma-separated match ids, e.g. `16114,16115`
      responses:
        "200":
          description: Matches response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetMatchesResponse"
              example:
                matches:
                  - match_id: "16114"
                    kickoff_utc: "2026-02-27T19:30:00Z"
                    kickoff_local: "2026-02-27T22:30:00+03:00"
                    city: "Saint Petersburg"
                    stadium: "«Газпром Арена»"
                    destination_airport_iata: "LED"
                    club_home_id: "3"
                    club_away_id: "444"
                    home_club:
                      club_id: "3"
                      name_ru: "Зенит"
                      name_en: "Zenit"
                      logo: "3.svg"
                      city: "Санкт-Петербург"
                      airport_iata: "LED"
                    away_club:
                      club_id: "444"
                      name_ru: "Балтика"
                      name_en: "Baltika"
                      logo: "444.svg"
                      city: "Калининград"
                      airport_iata: "KGD"
                    tickets_link: "https://tickets.fc-zenit.ru/football/tickets/#zenit"
                errors: []
        "400":
          description: Invalid request params
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: "ids query is required, example: /v1/matches?ids=16114,16115"
        "502":
          description: Upstream source error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetMatchesErrorResponse"
              example:
                error: "match adapter error"
                errors:
                  - match_id: 16114
                    error: "match adapter error"

  /v1/matches/upcoming:
    get:
      summary: Get upcoming matches
      description: Returns nearest upcoming matches sorted by kickoff UTC ascending.
      parameters:
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 12
          description: Number of matches to return.
        - in: query
          name: club_id
          required: false
          schema:
            type: integer
            minimum: 1
          description: Filter by club id. Returns matches where club is home or away.
      responses:
        "200":
          description: Upcoming matches response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetMatchesResponse"
              example:
                matches:
                  - match_id: "16114"
                    kickoff_utc: "2026-02-27T19:30:00Z"
                    kickoff_local: "2026-02-27T22:30:00+03:00"
                    city: "Saint Petersburg"
                    stadium: "«Газпром Арена»"
                    destination_airport_iata: "LED"
                    club_home_id: "3"
                    club_away_id: "444"
                    home_club:
                      club_id: "3"
                      name_ru: "Зенит"
                      name_en: "Zenit"
                      logo: "3.svg"
                      city: "Санкт-Петербург"
                      airport_iata: "LED"
                    away_club:
                      club_id: "444"
                      name_ru: "Балтика"
                      name_en: "Baltika"
                      logo: "444.svg"
                      city: "Калининград"
                      airport_iata: "KGD"
                    tickets_link: "https://tickets.fc-zenit.ru/football/tickets/#zenit"
                errors: []
        "400":
          description: Invalid request params
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: "limit must be a positive integer"
        "502":
          description: Upstream source error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: "match adapter error"

  /v1/matches/upcoming-with-airfare:
    get:
      summary: Get upcoming matches with airfare summary
      description: Returns upcoming matches and best available airfare per match for given origin.
      parameters:
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 12
          description: Number of matches to return.
        - in: query
          name: origin_iata
          required: false
          schema:
            type: string
            minLength: 3
            maxLength: 3
            pattern: "^[A-Za-z]{3}$"
            default: MOW
          description: Origin city/airport IATA. If omitted, gateway default is used.
        - in: query
          name: club_id
          required: false
          schema:
            type: integer
            minimum: 1
          description: Filter by club id. Returns matches where club is home or away.
      responses:
        "200":
          description: Upcoming matches with airfare summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpcomingWithAirfareResponse"
              example:
                origin_iata: "MOW"
                items:
                  - match:
                      match_id: "16121"
                      kickoff_utc: "2026-03-02T12:00:00Z"
                      kickoff_local: "2026-03-02T15:00:00+03:00"
                      city: "Сочи"
                      stadium: "«Фишт»"
                      destination_airport_iata: "AER"
                      club_home_id: "525"
                      club_away_id: "1"
                      home_club:
                        club_id: "525"
                        name_ru: "Сочи"
                        name_en: "Sochi"
                        logo: "525.svg"
                        city: "Сочи"
                        airport_iata: "AER"
                      away_club:
                        club_id: "1"
                        name_ru: "Спартак Москва"
                        name_en: "Spartak Moscow"
                        logo: "1.svg"
                        city: "Москва"
                        airport_iata: "MOW"
                      tickets_link: "https://store.pfcsochi.ru/tickets/"
                    min_price: 6308
                    best_slot: "FARE_SLOT_RET_D_PLUS_1"
                    best_date: "2026-03-03"
                    best_return_price: 6308
                    best_return_date: "2026-03-03"
                errors: []
        "400":
          description: Invalid request params
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: "origin_iata must be 3 latin letters"
        "502":
          description: Upstream source error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: "match adapter error"

  /v1/matches/{match_id}:
    get:
      summary: Get match by id
      parameters:
        - in: path
          name: match_id
          required: true
          schema:
            type: integer
            format: int64
            minimum: 1
      responses:
        "200":
          description: Match response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Match"
              example:
                match_id: "16121"
                kickoff_utc: "2026-03-02T12:00:00Z"
                kickoff_local: "2026-03-02T15:00:00+03:00"
                city: "Сочи"
                stadium: "«Фишт»"
                destination_airport_iata: "AER"
                club_home_id: "525"
                club_away_id: "1"
                home_club:
                  club_id: "525"
                  name_ru: "Сочи"
                  name_en: "Sochi"
                  logo: "525.svg"
                  city: "Сочи"
                  airport_iata: "AER"
                away_club:
                  club_id: "1"
                  name_ru: "Спартак Москва"
                  name_en: "Spartak Moscow"
                  logo: "1.svg"
                  city: "Москва"
                  airport_iata: "MOW"
                tickets_link: "https://store.pfcsochi.ru/tickets/"
        "400":
          description: Invalid request params
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: "invalid match_id"
        "502":
          description: Upstream source error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: "match adapter error"

  /v1/matches/{match_id}/airfare:
    get:
      summary: Get airfare slots by match
      description: Returns 6 airfare slots around match date and tickets link.
      parameters:
        - in: path
          name: match_id
          required: true
          schema:
            type: integer
            format: int64
            minimum: 1
          description: Match ID
        - in: query
          name: origin_iata
          required: false
          schema:
            type: string
            minLength: 3
            maxLength: 3
            pattern: "^[A-Za-z]{3}$"
            default: MOW
          description: Origin city/airport IATA code. If omitted, gateway default is used.
      responses:
        "200":
          description: Airfare slots response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetAirfareByMatchResponse"
              example:
                matchId: "16121"
                ticketsLink: "https://store.pfcsochi.ru/tickets/"
                slots:
                  - slot: FARE_SLOT_OUT_D_MINUS_2
                    direction: FARE_DIRECTION_OUTBOUND
                    date: "2026-02-28"
                    prices: []
                    windowLevel: FARE_WINDOW_LEVEL_STRICT
                  - slot: FARE_SLOT_OUT_D_MINUS_1
                    direction: FARE_DIRECTION_OUTBOUND
                    date: "2026-03-01"
                    prices: ["7278"]
                    windowLevel: FARE_WINDOW_LEVEL_STRICT
                  - slot: FARE_SLOT_OUT_D0_ARRIVE_BY
                    direction: FARE_DIRECTION_OUTBOUND
                    date: "2026-03-02"
                    prices: []
                    windowLevel: FARE_WINDOW_LEVEL_SOFT_2
                  - slot: FARE_SLOT_RET_D0_DEPART_AFTER
                    direction: FARE_DIRECTION_RETURN
                    date: "2026-03-02"
                    prices: ["8796"]
                    windowLevel: FARE_WINDOW_LEVEL_SOFT_2
                  - slot: FARE_SLOT_RET_D_PLUS_1
                    direction: FARE_DIRECTION_RETURN
                    date: "2026-03-03"
                    prices: ["6308"]
                    windowLevel: FARE_WINDOW_LEVEL_STRICT
                  - slot: FARE_SLOT_RET_D_PLUS_2
                    direction: FARE_DIRECTION_RETURN
                    date: "2026-03-04"
                    prices: ["6653"]
                    windowLevel: FARE_WINDOW_LEVEL_STRICT
        "400":
          description: Invalid request params
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: "origin_iata must be 3 latin letters"
        "502":
          description: Upstream source error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: "upstream error"
        "404":
          description: Match not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: "match not found"
        "503":
          description: Upstream source unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: "source temporarily unavailable"
        "504":
          description: Upstream timeout
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: "deadline exceeded"

components:
  schemas:
    Club:
      type: object
      properties:
        club_id:
          type: string
        name_ru:
          type: string
        name_en:
          type: string
        logo:
          type: string
        city:
          type: string
        airport_iata:
          type: string

    GetClubsResponse:
      type: object
      required:
        - clubs
      properties:
        clubs:
          type: array
          items:
            $ref: "#/components/schemas/Club"

    Match:
      type: object
      properties:
        match_id:
          type: string
        kickoff_utc:
          type: string
          format: date-time
        kickoff_local:
          type: string
          format: date-time
        city:
          type: string
        stadium:
          type: string
        destination_airport_iata:
          type: string
        club_home_id:
          type: string
        club_away_id:
          type: string
        home_club:
          $ref: "#/components/schemas/Club"
        away_club:
          $ref: "#/components/schemas/Club"
        tickets_link:
          type: string
          format: uri

    GetMatchesResponse:
      type: object
      required:
        - matches
      properties:
        matches:
          type: array
          items:
            $ref: "#/components/schemas/Match"
        errors:
          type: array
          description: Per-id errors for failed lookups when partial success is returned.
          items:
            $ref: "#/components/schemas/MatchLoadError"

    MatchLoadError:
      type: object
      required:
        - match_id
        - error
      properties:
        match_id:
          type: integer
          format: int64
        error:
          type: string

    GetMatchesErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: string
        errors:
          type: array
          items:
            $ref: "#/components/schemas/MatchLoadError"

    GetAirfareByMatchResponse:
      type: object
      required:
        - matchId
        - ticketsLink
        - slots
      properties:
        matchId:
          type: string
          description: Match ID as string (gateway mirrors gRPC JSON)
        ticketsLink:
          type: string
          format: uri
        slots:
          type: array
          minItems: 6
          maxItems: 6
          items:
            $ref: "#/components/schemas/FareSlot"

    FareSlot:
      type: object
      required:
        - slot
        - direction
        - date
        - prices
        - windowLevel
      properties:
        slot:
          type: string
          enum:
            - FARE_SLOT_OUT_D_MINUS_2
            - FARE_SLOT_OUT_D_MINUS_1
            - FARE_SLOT_OUT_D0_ARRIVE_BY
            - FARE_SLOT_RET_D0_DEPART_AFTER
            - FARE_SLOT_RET_D_PLUS_1
            - FARE_SLOT_RET_D_PLUS_2
        direction:
          type: string
          enum:
            - FARE_DIRECTION_OUTBOUND
            - FARE_DIRECTION_RETURN
        date:
          type: string
          format: date
          description: UTC date in YYYY-MM-DD
        prices:
          type: array
          items:
            type: string
        windowLevel:
          type: string
          enum:
            - FARE_WINDOW_LEVEL_STRICT
            - FARE_WINDOW_LEVEL_SOFT_2
            - FARE_WINDOW_LEVEL_SOFT_4

    UpcomingWithAirfareResponse:
      type: object
      required:
        - origin_iata
        - items
        - errors
      properties:
        origin_iata:
          type: string
        items:
          type: array
          items:
            $ref: "#/components/schemas/UpcomingWithAirfareItem"
        errors:
          type: array
          items:
            $ref: "#/components/schemas/AirfareLoadError"

    UpcomingWithAirfareItem:
      type: object
      required:
        - match
      properties:
        match:
          $ref: "#/components/schemas/Match"
        min_price:
          type: integer
          format: int64
          nullable: true
        best_slot:
          type: string
        best_date:
          type: string
          format: date
        best_outbound_price:
          type: integer
          format: int64
          nullable: true
        best_return_price:
          type: integer
          format: int64
          nullable: true
        best_return_date:
          type: string
          format: date
        best_round_trip_price:
          type: integer
          format: int64
          nullable: true
        airfare_error:
          type: string

    AirfareLoadError:
      type: object
      required:
        - match_id
        - error
      properties:
        match_id:
          type: string
        error:
          type: string

    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: string
